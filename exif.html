<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXIF Cleaner — imgtools</title>
  <link rel="stylesheet" href="common.css">
  <script>
    (function(){
      var t = localStorage.getItem("it-theme") || "dark";
      var a = localStorage.getItem("it-accent") || "#c8ff00";
      document.documentElement.setAttribute("data-theme", t);
      document.documentElement.style.setProperty("--accent", a);
      var r=parseInt(a.slice(1,3),16),g=parseInt(a.slice(3,5),16),b=parseInt(a.slice(5,7),16);
      document.documentElement.style.setProperty("--accent-dim","rgba("+r+","+g+","+b+",0.12)");
    })();
  </script>
  <link rel="manifest" href="manifest.json">
  <style>
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0 20px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="logo"><a href="index.html">imgtools</a></div>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="batchcomp.html">Компрессор</a>
      <a href="exif.html" class="active">EXIF</a>
      <a href="imgconv.html">Фото</a>
    </nav>
  </header>

  <main class="container">
    <h1>EXIF Cleaner & Editor</h1>
    <p>Просмотр и редактирование метаданных. Поддерживается удаление GPS и изменение даты.</p>

    <label for="fileInput">Выбери изображение (JPG/RAW)</label>
    <input type="file" id="fileInput" accept="image/jpeg,image/x-canon-cr2,image/x-nikon-nef,image/x-sony-arw">

    <hr class="section-divider">

    <div class="table-wrap">
      <table id="metaTable">
        <thead>
          <tr><th>Параметр</th><th>Значение</th></tr>
        </thead>
        <tbody id="metaBody">
          <tr><td colspan="2" style="text-align:center;color:var(--text-dim);">Файл не выбран</td></tr>
        </tbody>
      </table>
    </div>

    <div class="controls" style="flex-direction:column;gap:12px;margin-top:20px;">
      <div style="width:100%;">
        <label for="dateInput">Дата съёмки</label>
        <input type="datetime-local" id="dateInput">
      </div>
    </div>

    <div class="actions" style="margin-top:20px;">
      <button id="gpsBtn" disabled>Удалить GPS</button>
      <button id="allBtn" disabled>Удалить всё</button>
      <button id="saveBtn" class="primary" disabled>Скачать результат</button>
      <button id="resetBtn">Сброс</button>
    </div>
  </main>

  <footer>imgtools</footer>

  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/piexifjs/piexif.min.js"></script>

  <script>
    const fileInput = document.getElementById('fileInput');
    const metaBody  = document.getElementById('metaBody');
    const dateInput = document.getElementById('dateInput');
    const gpsBtn    = document.getElementById('gpsBtn');
    const allBtn    = document.getElementById('allBtn');
    const saveBtn   = document.getElementById('saveBtn');
    const resetBtn  = document.getElementById('resetBtn');

    let dataURL = null;
    let originalFileName = 'image.jpg';
    let exifRemoved = false; // флаг: после allBtn piexif.load больше не работает

    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      originalFileName = file.name;
      exifRemoved = false;
      dataURL = await readAsDataURL(file);

      try {
        const exif = await exifr.parse(file);
        renderMeta(exif);

        if (exif && exif.DateTimeOriginal) {
          // exifr возвращает Date-объект или строку вида "2024:05:01 12:30:00"
          let d = exif.DateTimeOriginal;
          if (d instanceof Date) {
            // форматируем в datetime-local: "YYYY-MM-DDTHH:MM"
            const pad = n => String(n).padStart(2, '0');
            dateInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
          } else {
            // строка "2024:05:01 12:30:00" → "2024-05-01T12:30"
            dateInput.value = String(d).replace(/^(\d{4}):(\d{2}):(\d{2}) (\d{2}:\d{2}).*/, '$1-$2-$3T$4');
          }
        }

        gpsBtn.disabled = false;
        allBtn.disabled = false;
        saveBtn.disabled = false;
      } catch (err) {
        metaBody.innerHTML = '<tr><td colspan="2" style="text-align:center;">Метаданные не найдены</td></tr>';
        saveBtn.disabled = false; // всё равно можно скачать без EXIF
      }
    };

    function renderMeta(d) {
      if (!d) {
        metaBody.innerHTML = '<tr><td colspan="2" style="text-align:center;">EXIF не найден</td></tr>';
        return;
      }
      let dateStr = '—';
      if (d.DateTimeOriginal instanceof Date) {
        dateStr = d.DateTimeOriginal.toLocaleString('ru');
      } else if (d.DateTimeOriginal) {
        dateStr = String(d.DateTimeOriginal);
      }
      metaBody.innerHTML = `
        <tr><td>Камера</td><td>${(d.Make || '') + ' ' + (d.Model || '—')}</td></tr>
        <tr><td>Дата</td><td>${dateStr}</td></tr>
        <tr><td>Программа</td><td>${d.Software || '—'}</td></tr>
        <tr><td>GPS</td><td>${d.latitude != null ? d.latitude.toFixed(4) + ', ' + d.longitude.toFixed(4) : '—'}</td></tr>
      `;
    }

    gpsBtn.onclick = () => {
      try {
        const ex = piexif.load(dataURL);
        ex.GPS = {};
        dataURL = piexif.insert(piexif.dump(ex), dataURL);
        alert('GPS удалён');
      } catch(e) {
        alert('Не удалось удалить GPS: ' + e.message);
      }
    };

    allBtn.onclick = () => {
      try {
        dataURL = piexif.remove(dataURL);
        exifRemoved = true;
        gpsBtn.disabled = true;
        allBtn.disabled = true;
        metaBody.innerHTML = '<tr><td colspan="2" style="text-align:center;">Все данные удалены</td></tr>';
        alert('EXIF очищен');
      } catch(e) {
        alert('Ошибка: ' + e.message);
      }
    };

    saveBtn.onclick = () => {
      // Применяем дату только если EXIF ещё не был полностью удалён
      if (dateInput.value && !exifRemoved) {
        try {
          const ex = piexif.load(dataURL);
          if (!ex.Exif) ex.Exif = {};
          // piexif ожидает формат "YYYY:MM:DD HH:MM:SS"
          const piexifDate = dateInput.value
            .replace('T', ' ')
            .replace(/^(\d{4})-(\d{2})-(\d{2})/, '$1:$2:$3') + ':00';
          ex.Exif[piexif.ExifIFD.DateTimeOriginal] = piexifDate;
          dataURL = piexif.insert(piexif.dump(ex), dataURL);
        } catch(e) {
          alert('Не удалось записать дату: ' + e.message);
        }
      }
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = 'cleaned-' + originalFileName;
      a.click();
    };

    resetBtn.onclick = () => location.reload();

    function readAsDataURL(f) {
      return new Promise(r => {
        const fr = new FileReader();
        fr.onload = () => r(fr.result);
        fr.readAsDataURL(f);
      });
    }
  </script>
  <script src="settings.js"></script>
  <script>if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
